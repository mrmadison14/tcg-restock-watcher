name: watch
on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

concurrency:
  group: tcg-watch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - name: Run watcher
        env:
          DISCORD_DEALS_WEBHOOK: ${{ secrets.DISCORD_DEALS_WEBHOOK }}
          DISCORD_TRACKER_WEBHOOK: ${{ secrets.DISCORD_TRACKER_WEBHOOK }}
        run: uv run python -m tcg_watcher
      - name: Commit state
        run: |
          git config user.name "tcg-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/
          if git diff --staged --quiet; then
            echo "no state changes"
            exit 0
          fi
          for attempt in 1 2 3 4 5 6; do
            git fetch origin main
            uv run python -m tcg_watcher.reconcile state
            git reset --soft origin/main
            git add state/
            if git diff --staged --quiet; then
              echo "converged: nothing to push"
              exit 0
            fi
            git commit -m "state: update snapshots [skip ci]"
            if git push origin HEAD:main; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            echo "push rejected on attempt $attempt; retrying"
            sleep 3
          done
          echo "commit-state failed after retries" >&2
          exit 1
